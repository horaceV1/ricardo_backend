# Admin: Tutorial help page
tutorial_videos.help_page:
  path: '/admin/ajuda'
  defaults:
    _controller: '\Drupal\tutorial_videos\Controller\TutorialVideosController::helpPage'
    _title: 'Centro de Ajuda'
  requirements:
    _permission: 'access administration pages'

# API: List all tutorial chapters and videos
tutorial_videos.api_list:
  path: '/api/tutorials'
  defaults:
    _controller: '\Drupal\tutorial_videos\Controller\TutorialVideosController::listTutorials'
  requirements:
    _access: 'TRUE'
  methods: [GET]

# API: Download the PDF manual (admin only)
tutorial_videos.api_download_manual:
  path: '/api/tutorial-manual/download'
  defaults:
    _controller: '\Drupal\tutorial_videos\Controller\TutorialVideosController::downloadManual'
  requirements:
    _access: 'TRUE'
  methods: [GET]

# API: Stream a tutorial video file
tutorial_videos.api_stream:
  path: '/api/tutorial-video/{chapter}/{filename}'
  defaults:
    _controller: '\Drupal\tutorial_videos\Controller\TutorialVideosController::streamVideo'
  requirements:
    _access: 'TRUE'
  methods: [GET]
